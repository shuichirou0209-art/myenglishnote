<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <meta name="description" content="英語表現を効率的に学習・管理できるWebアプリ">
    <title>英語表現ストック</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
</head>
<body>
    <div class="container">
        <h1>英語表現ストック</h1>

        <!-- 検索エリア -->
        <div class="search-section">
            <input type="text" id="searchInput" placeholder="検索: 表現、意味、タグで検索...">
        </div>

        <!-- タグ絞り込みエリア -->
        <div class="tag-filter-section">
            <button type="button" id="toggleTagFilter" class="accordion-button">タグで絞り込み</button>
            <div id="tagFilterContainer" class="tag-filter-container collapsed">
                <div id="tagList" class="tag-list">
                    <!-- タグ一覧はJavaScriptで動的に生成 -->
                </div>
                <div id="activeTags" class="active-tags">
                    <!-- 選択中のタグチップはJavaScriptで動的に生成 -->
                </div>
                <div class="tag-filter-actions">
                    <button id="clearAllTags" class="btn btn-secondary">すべて解除</button>
                </div>
            </div>
        </div>

        <!-- エントリ作成フォーム -->
        <div class="form-section">
            <button type="button" id="toggleFormButton" class="accordion-button">＋ 表現を追加</button>
            <div id="entryFormContainer" class="form-container collapsed">
                <form id="entryForm">
                    <div class="form-group">
                        <label for="expression">表現 *</label>
                        <input type="text" id="expression" placeholder="例：over the moon" required>
                    </div>

                    <div class="form-group">
                        <label for="meaning">意味 *</label>
                        <textarea id="meaning" placeholder="意味を入力" rows="3" required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="examples">用例</label>
                        <textarea id="examples" placeholder="使用例を入力（複数ある場合は改行で区切る）" rows="3"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="notes">コメント</label>
                        <textarea id="notes" placeholder="その他の注記" rows="2"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="tags">タグ</label>
                        <input type="text" id="tags" placeholder="タグをカンマで区切って入力（例：文語,イディオム）">
                    </div>

                    <button type="submit" class="btn btn-primary">作成</button>
                </form>
            </div>
        </div>

        <!-- 一覧表示エリア -->
        <div class="list-section">
            <h2>表現一覧 (<span id="entryCount">0</span>件)</h2>
            <div class="pagination" id="paginationTop">
                <button id="prevTop" class="btn btn-secondary" onclick="changePage(-1)">前へ</button>
                <span id="pageIndicatorTop">1 / 1</span>
                <button id="nextTop" class="btn btn-secondary" onclick="changePage(1)">次へ</button>
            </div>
            <div id="entriesList" class="entries-list">
                <p class="empty-message">エントリがまだありません</p>
            </div>
            <div class="pagination" id="paginationBottom">
                <button id="prevBottom" class="btn btn-secondary" onclick="changePage(-1)">前へ</button>
                <span id="pageIndicatorBottom">1 / 1</span>
                <button id="nextBottom" class="btn btn-secondary" onclick="changePage(1)">次へ</button>
            </div>

            <div class="backup-actions">
                <button id="exportButton" class="btn btn-secondary" onclick="exportEntries()">エクスポート (JSON)</button>
                <button id="importButton" class="btn btn-secondary" onclick="document.getElementById('importFileInput').click()">インポート (JSON)</button>
                <input id="importFileInput" type="file" accept="application/json" style="display:none" onchange="importEntries(event)">
            </div>
        </div>
    </div>

    <!-- 編集用モーダル -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>エントリを編集</h2>
                <button type="button" class="modal-close" onclick="closeEditModal()">&times;</button>
            </div>
            <form id="editForm">
                <div class="form-group">
                    <label for="editExpression">表現 *</label>
                    <input type="text" id="editExpression" placeholder="表現を入力" required>
                </div>

                <div class="form-group">
                    <label for="editMeaning">意味 *</label>
                    <textarea id="editMeaning" placeholder="意味を入力" rows="3" required></textarea>
                </div>

                <div class="form-group">
                    <label for="editExamples">用例</label>
                    <textarea id="editExamples" placeholder="使用例を入力（複数ある場合は改行で区切る）" rows="3"></textarea>
                </div>

                <div class="form-group">
                    <label for="editNotes">コメント</label>
                    <textarea id="editNotes" placeholder="その他の注記" rows="2"></textarea>
                </div>

                <div class="form-group">
                    <label for="editTags">タグ</label>
                    <input type="text" id="editTags" placeholder="タグをカンマで区切って入力">
                </div>

                <div class="modal-actions">
                    <button type="submit" class="btn btn-primary">保存</button>
                    <button type="button" class="btn btn-cancel" onclick="closeEditModal()">キャンセル</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Service Worker登録
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(registration => {
                console.log('Service Worker登録成功:', registration);
            }).catch(error => {
                console.log('Service Worker登録失敗:', error);
            });
        }
    </script>

    <script src="js/script.js"></script>
</body>
</html>
